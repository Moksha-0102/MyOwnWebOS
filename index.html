<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div class="desktop-environment">
            <div class="desktop-icon" id="desktop-notepad">
                <div class="icon-emoji">📝</div>
                <div class="icon-label">Notepad</div>
            </div>

            <div class="desktop-icon" id="desktop-calculator">
                <div class="icon-emoji">🧮</div>
                <div class="icon-label">Calculator</div>
            </div>
        </div>

        <div class="context-menu" id="desktop-context-menu" style="display: none;">
            <div class="context-item" id="context-refresh">Refresh</div>
            <div class="context-divider"></div>
            <div class="context-item" id="context-settings">Personalize...</div>
        </div>
        <div class="window" id="myFirstWindow">
            <div class="title-bar">
                <div class="window-title">My App</div>

                <div class="window-controls">
                    <button id="min-btn">_</button>
                    <button id="max-btn">☐</button>
                    <button id="close-btn">X</button>
                </div>
            </div>
            <div class="window-content">
                <p>Hello World!</p>
            </div>
        </div> 
        
        <div class="start-menu" id="start-menu">
            <div class="start-menu-item" id="menu-notepad">Notepad</div>
            <div class="start-menu-item" id="menu-calculator">Calculator</div>
            <div class="start-menu-divider"></div>
            <div class="start-menu-item" id="menu-settings">Settings</div>
        </div>

        <div class="window" id="notepad-window" style="display: none; top: 100px; left: 150px;">
            <div class="title-bar">
                <div class="window-title">Notepad</div>
                <div class="window-controls">
                    <button id="np-min-btn">_</button>
                    <button id="np-max-btn">☐</button>
                    <button id="np-close-btn">X</button>
                </div>
            </div>
            <div class="window-content" style="padding: 0; height: 100%;">
                <textarea class="notepad-text"></textarea>
            </div>
        </div>

        <div class="window" id="calculator-window" style="display:none; top: 150px; left: 200px; width: 250px;">
            <div class="title-bar">
                <div class="window-title">Calculator</div>
                <div class="window-controls">
                    <button id="calc-min-btn">_</button>
                    <button id="calc-max-btn">☐</button>
                    <button id="calc-close-btn">X</button>
                </div>
            </div>
            <div class="window-content" style="padding: 10px;">
                <input type="text" class="calc-display" id="calc-display" disabled value="0">

                <div class="calculator-grid">
                    <button class="calc-btn">7</button>
                    <button class="calc-btn">8</button>
                    <button class="calc-btn">9</button>
                    <button class="calc-btn op-btn">/</button>

                    <button class="calc-btn">4</button>
                    <button class="calc-btn">5</button>
                    <button class="calc-btn">6</button>
                    <button class="calc-btn op-btn">*</button>

                    <button class="calc-btn">1</button>
                    <button class="calc-btn">2</button>
                    <button class="calc-btn">3</button>
                    <button class="calc-btn op-btn">-</button>

                    <button class="calc-btn">0</button>
                    <button class="calc-btn">C</button>
                    <button class="calc-btn op-btn">=</button>
                    <button class="calc-btn op-btn">+</button>
                </div>
            </div>            
        </div>

        <div class="window" id='settings-window' style="display: none; top: 100px; left: 300px; width: 320px;">
            <div class="title-bar">
                <div class="window-title">Settings</div>
                <div class="window-controls">
                    <button id="set-min-btn">_</button>
                    <button id="set-max-btn">☐</button>
                    <button id="set-close-btn">X</button>
                </div>
            </div>

            <div class="window-content" style="gap: 20px;">

                <div class="settings-group">
                    <label>Clock Format:</label>
                    <select id="time-format-select">
                        <option value="12">12-Hour (AM/PM)</option>
                        <option value="24">24-Hour (Military)</option>
                    </select>
                </div>

                <div class="settings-group">
                    <label>Desktop Wallpaper</label>
                    <select id="wallpaper-select">
                        <option value="default">Default Blue</option>
                        <option value="custom">Custom URL...</option>
                        <option value="nasa">NASA Picture of the Day</option>
                    </select>

                    <input type="text" id="custom-wallpaper-url" placeholder="Paste image URL here..." style="display: none; margin-top: 8px;">

                    <p id="nasa-error" style="color: red; font-size: 12px; display: none; margin-top: 8px; font-weight: bold;">NASA Image not available right now. Falling back to default.</p>
                </div>
                
            </div>
        </div>




        <div class="taskbar">
            <div class="taskbar-left">
                <div class="start-button">Menu</div>
                <div class="taskbar-app active" id="taskbar-app-1">My App</div>
                <div class="taskbar-app" id="taskbar-notepad" style="display:none;">Notepad</div>
                <div class="taskbar-app" id="taskbar-calculator" style="display: none;">Calculator</div> 
                <div class="taskbar-app" id="taskbar-settings" style="display: none;">Settings</div>
            </div>
            <div class="clock"></div>
        </div>
        
        <script src="index.js"></script>
    </body>
</html>
